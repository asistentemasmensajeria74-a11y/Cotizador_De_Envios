<!DOCTYPE html>
<html>
<head>
  <title>Cotizador de Envíos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJxSSty38BQj38fgXfrrMbdOlme3AJN6I&callback=initMap" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #map { height: 200px; margin: 10px 0; }
   .form-group { margin: 10px 0; }
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; font-size: 16px; line-height: 1.2; }
    button { padding: 12px 20px; margin: 5px; cursor: pointer; font-size: 16px; width: 100%; box-sizing: border-box; }
    input { padding: 8px 10px; margin: 3px 0; width: 100%; box-sizing: border-box; font-size: 14px; line-height: 1.2; }
    #resultado { margin-top: 15px; font-size: 1.3em; color: #333; line-height: 1.2; }
   .button-group { display: flex; gap: 8px; margin-top: 5px; flex-wrap: nowrap; }
   .button-group button { padding: 6px 12px; width: auto; font-size: 13px; white-space: nowrap; line-height: 1.2; }
    #btnCotizar { padding: 6px 12px; font-size: 20px; width: auto; margin: 5px 0; line-height: 1.2; }
   .servicio-rapido { margin: 10px 0; padding: 18px; background-color: #f0f0f0; border-radius: 5px; font-size: 20px; line-height: 1.2; }
    @media (min-width: 600px) {
      button { width: auto; margin: 5px; }
      input { width: 250px; }
     .button-group { justify-content: flex-start; }
      #map { height: 300px; }
      #btnCotizar { padding: 8px 15px; font-size: 14px; }
     .servicio-rapido { padding: 10px; font-size: 14px; }
    }
    @media (max-width: 400px) {
     .button-group button { padding: 5px 10px; font-size: 12px; }
      #map { height: 180px; }
      input { padding: 6px 8px; font-size: 13px; }
      #btnCotizar { padding: 5px 10px; font-size: 12px; }
     .servicio-rapido { padding: 6px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <h2 style="font-size: 1.8em; line-height: 1.2;">Cotizador de Envíos</h2>
  <!-- Origen -->
  <h3 style="font-size: 1.5em; line-height: 1.2; margin-bottom: 5px;">Origen (Saltillo, Coahuila)</h3>
  <div class="form-group">
    <input type="text" id="origenCalle" placeholder="Calle y número">
    <input type="text" id="origenColonia" placeholder="Colonia">
    <div class="button-group">
      <button onclick="selectOriginLocation()">Usar mi ubicación</button>
      <button onclick="openMap('origen')">Seleccionar en mapa</button>
    </div>
  <!-- Destino -->
  <h3 style="font-size: 1.5em; line-height: 1.2; margin-bottom: 5px;">Destino</h3>
  <div class="form-group">
    <input type="text" id="destinoCalle" placeholder="Calle y número">
    <input type="text" id="destinoColonia" placeholder="Colonia">
    <div class="button-group">
      <button onclick="selectDestinationLocation()">Usar mi ubicación</button>
      <button onclick="openMap('destino')">Seleccionar en mapa</button>
    </div>
  </div>
  <!-- Servicio Rápido -->
  <div class="servicio-rapido">
    <label><input type="checkbox" id="servicioRapido"> ¿Quieres Servicio Rápido?</label>
  </div>
  <!-- Botón cotizar con ID exclusivo -->
  <button id="btnCotizar" onclick="cotizar()">COTIZAR</button>
  <div id="resultado"></div>
  <div id="map"></div>
  <script>
    let map, origenMarker, destinoMarker;
    let origenLatLng = null, destinoLatLng = null;

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 10,
        center: { lat: 25.4208, lng: -101.0044 } // Saltillo
      });
    }

    function updateMarker(type, latLng) {
      if (type === 'origen') {
        if (origenMarker) origenMarker.setMap(null);
        origenMarker = new google.maps.Marker({
          position: latLng,
          map: map,
          title: 'Origen',
          icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
        });
      } else {
        if (destinoMarker) destinoMarker.setMap(null);
        destinoMarker = new google.maps.Marker({
          position: latLng,
          map: map,
          title: 'Destino',
          icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
        });
      }
    }

    function selectOriginLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          origenLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          updateMarker('origen', origenLatLng);
          obtenerDireccion(origenLatLng, 'origen');
        });
      }
    }

    function selectDestinationLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          destinoLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          updateMarker('destino', destinoLatLng);
          obtenerDireccion(destinoLatLng, 'destino');
        });
      }
    }

    function openMap(type) {
      const mapDiv = document.getElementById('map');
      mapDiv.style.display = 'block';
      map.setCenter(origenLatLng || { lat: 25.4208, lng: -101.0044 });

      google.maps.event.clearListeners(map, 'click');

      map.addListener('click', e => {
        const latLng = e.latLng.toJSON();
        if (type === 'origen') {
          origenLatLng = latLng;
          updateMarker('origen', latLng);
          obtenerDireccion(latLng, 'origen');
        } else {
          destinoLatLng = latLng;
          updateMarker('destino', latLng);
          obtenerDireccion(latLng, 'destino');
        }
      });
    }

    function obtenerDireccion(latLng, tipo) {
      const geocoder = new google.maps.Geocoder();

      geocoder.geocode({ location: latLng }, function(results, status) {
        if (status!== 'OK') {
          console.error('Geocoding falló con status:', status);
          alert('No se pudo obtener la dirección. Status: ' + status);
          return;
        }

        if (!results || results.length === 0) {
          console.error('No se encontraron resultados');
          alert('No se encontró dirección para este punto. Intenta otro lugar.');
          return;
        }

        const primerResultado = results[0];
        let calle = 'Calle no disponible';
        let colonia = 'Colonia no disponible';

        if (primerResultado.formatted_address) {
          if (typeof primerResultado.formatted_address === 'string') {
            const partes = primerResultado.formatted_address.split(', ');
            calle = partes[0] || 'Calle no disponible';
            colonia = partes[1] || 'Colonia no disponible';
          }
        } else if (primerResultado.address_components) {
          for (let i = 0; i < primerResultado.address_components.length; i++) {
            const componente = primerResultado.address_components[i];
            if (componente.types.includes('street_number') || componente.types.includes('route')) {
              calle = componente.long_name;
            }
            if (componente.types.includes('sublocality') || componente.types.includes('neighborhood')) {
              colonia = componente.long_name;
            }
          }
          if (calle === 'Calle no disponible' && primerResultado.address_components.length > 0) {
            calle = primerResultado.address_components[0].long_name;
          }
        } else {
          calle = `Lat: ${latLng.lat.toFixed(4)}`;
          colonia = `Lng: ${latLng.lng.toFixed(4)}`;
        }

        if (tipo === 'origen') {
          document.getElementById('origenCalle').value = calle;
          document.getElementById('origenColonia').value = colonia;
        } else if (tipo === 'destino') {
          document.getElementById('destinoCalle').value = calle;
          document.getElementById('destinoColonia').value = colonia;
        }
      });
    }

    // YA NO USAMOS HAVERSINE. Ahora usamos Distance Matrix API de Google
    async function cotizar() {
      if (!origenLatLng ||!destinoLatLng) {
        alert('¡Debes seleccionar origen y destino!');
        return;
      }

      if (origenLatLng.lat === destinoLatLng.lat && origenLatLng.lng === destinoLatLng.lng) {
        alert('¡El origen y destino no pueden ser el mismo punto!');
        return;
      }

      document.getElementById('resultado').innerHTML = 'Calculando ruta real...';

      const service = new google.maps.DistanceMatrixService();

      service.getDistanceMatrix({
        origins: [origenLatLng],
        destinations: [destinoLatLng],
        travelMode: google.maps.TravelMode.DRIVING,
        unitSystem: google.maps.UnitSystem.METRIC,
      }, async (response, status) => {
        if (status!== 'OK') {
          document.getElementById('resultado').innerHTML = `Error: ${status}. Revisa que tengas activada "Distance Matrix API"`;
          return;
        }

        const element = response.rows[0].elements[0];
        if (element.status!== "OK") {
          document.getElementById('resultado').innerHTML = `No se pudo calcular la ruta: ${element.status}`;
          return;
        }

        // Distancia real por carretera en km
        const distanceKm = element.distance.value / 1000;
        const duracion = element.duration.text;

        console.log('Distancia real por carretera:', distanceKm, 'km');
        console.log('Tiempo estimado:', duracion);

        // Calcular precio usando tu lógica de Google Sheets
        const precio = await calcularPrecio(distanceKm);

        // Mostrar resultado
        document.getElementById('resultado').innerHTML =
          `<h3>Precio: $${precio.toFixed(2)}</h3>
           <p>Distancia real: ${distanceKm.toFixed(2)} km</p>
           <p>Tiempo estimado: ${duracion}</p>`;
      });
    }

    async function calcularPrecio(km) {
      const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbx_aBWgPzdKEWqiEFSuzyYZ95Lvc23ijU8dNqy8eckShQfL1oryFGKx1fIOThhFlXEs/exec';

      try {
        const response = await fetch(appsScriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'action=obtenerPreciosEnvios'
        });

        const data = await response.json();

        if (!data.success) {
          console.error('Error:', data.message);
          alert('Error al obtener precios: ' + data.message);
          return 0;
        }

        const partida = parseFloat(data.Partida) || 0;
        const costoKm = parseFloat(data.Costo_Km) || 0;
        const servicioRapidoPorcentaje = parseFloat(data.Servicio_Rapido) || 0;
        const extraHoraPico = parseFloat(data.Extra_Hora_Pico) || 0;
        const extraNocturno = parseFloat(data.Extra_nocturno) || 0;

        const ahora = new Date();
        const horaActual = ahora.getHours();
        const minutoActual = ahora.getMinutes();
        const horaActualDecimal = horaActual + (minutoActual / 60);

        function convertirHoraADecimal(horaTexto) {
          if (!horaTexto) return -1;
          const partes = horaTexto.split(':');
          const horas = parseInt(partes[0], 10);
          const minutos = parseInt(partes[1], 10) || 0;
          return horas + (minutos / 60);
        }

        const horaPicoInDecimal = convertirHoraADecimal(data.Hora_Pico_in);
        const horaPicoFinDecimal = convertirHoraADecimal(data.Hora_pico_fin);
        const horaNocturnoInDecimal = convertirHoraADecimal(data.Hora_Nocturno_in);
        const horaNocturnoFinDecimal = convertirHoraADecimal(data.Hora_Nocturno_fin);

        const estaEnHoraPico = horaActualDecimal >= horaPicoInDecimal && horaActualDecimal <= horaPicoFinDecimal;

        let estaEnHoraNocturna = false;
        if (horaNocturnoInDecimal > horaNocturnoFinDecimal) {
          estaEnHoraNocturna = horaActualDecimal >= horaNocturnoInDecimal || horaActualDecimal <= horaNocturnoFinDecimal;
        } else {
          estaEnHoraNocturna = horaActualDecimal >= horaNocturnoInDecimal && horaActualDecimal <= horaNocturnoFinDecimal;
        }

        const usaServicioRapido = document.getElementById('servicioRapido').checked;

        let total = partida + (km * costoKm);

        if (usaServicioRapido) {
          total += total * servicioRapidoPorcentaje;
          if (estaEnHoraPico) {
            total += total * extraHoraPico;
          }
        }

        if (estaEnHoraNocturna) {
          total += total * extraNocturno;
        }

        console.log('=== CÁLCULO CON DISTANCIA REAL ===');
        console.log('KM reales:', km.toFixed(2));
        console.log('Total final:', total);
        console.log('=== FIN CÁLCULO ===');

        return total;

      } catch (error) {
        console.error('Error al obtener datos del Apps Script:', error);
        alert('Error al calcular el precio. Intenta de nuevo.');
        return 0;
      }
    }
  </script>
</body>
</html>
